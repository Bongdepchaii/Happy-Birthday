<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Happy Birthday 🎆 - Pháo Hoa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* p5 canvas sits at back */
    canvas {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Overlay UI ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(16px, 5vw, 32px) clamp(12px, 4vw, 24px);
    }

    /* Top badge */
    .top-badge {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.06em;
      animation: fadeDown 1s ease;
    }

    .top-badge span {
      color: #f9a8d4;
    }

    /* Center Big Text */
    .center-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .main-hb {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.8rem, 13vw, 7rem);
      background: linear-gradient(135deg, #f9a8d4, #fcd34d, #f472b6, #c084fc, #93c5fd);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite, textEntrance 1.2s cubic-bezier(0.34, 1.4, 0.64, 1) 0.3s both;
      filter: drop-shadow(0 0 30px rgba(244, 114, 182, 0.6));
      line-height: 1.1;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }
    }

    @keyframes textEntrance {
      from {
        opacity: 0;
        transform: scale(0.4) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .name-line {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 7vw, 3rem);
      color: white;
      text-shadow: 0 0 30px rgba(249, 168, 212, 0.8), 0 0 60px rgba(196, 132, 252, 0.5);
      animation: textEntrance 1.2s cubic-bezier(0.34, 1.4, 0.64, 1) 0.6s both;
      letter-spacing: 0.04em;
    }

    .name-line .pink {
      color: #f9a8d4;
    }

    .tagline {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: 700;
      color: rgba(255, 255, 255, 0.65);
      animation: textEntrance 1.2s ease 0.9s both;
      letter-spacing: 0.05em;
    }

    /* Message Card */
    .msg-card {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: clamp(14px, 4vw, 22px) clamp(16px, 5vw, 28px);
      max-width: min(90vw, 440px);
      width: 100%;
      text-align: center;
      animation: fadeUp 1.2s ease 1.2s both;
    }

    .msg-text {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.82rem, 3vw, 0.95rem);
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.78);
    }

    .msg-text strong {
      color: #fcd34d;
    }

    .msg-text .pink {
      color: #f9a8d4;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 24px;
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.35), rgba(168, 85, 247, 0.35));
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.8rem, 2.8vw, 0.9rem);
      font-weight: 800;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.5), rgba(168, 85, 247, 0.5));
      transform: translateY(-2px);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>
  <!-- Overlay with text -->
  <div class="overlay">
    <div class="top-badge">🎆 <span>Chúc mừng sinh nhật</span> • Bẹt 🎆</div>

    <div class="center-text">
      <div class="main-hb">Happy<br>Birthday!</div>
      <div class="name-line">🌸 <span class="pink">Trương Thị Mỹ Ly</span> 🌸</div>
      <p class="tagline">✨ Tuổi mới — Hạnh phúc mới ✨</p>
    </div>

    <div class="msg-card">
      <p class="msg-text">
        Chúc <strong>Bẹt</strong> của anh <span class="pink">học giỏi</span>, ngày càng xinh đẹp! 💖<br>
        Không bao giờ buồn, lúc nào cũng <strong>cười tươi</strong> nha. Chúc em sau này ra trường có <strong>công việc
          thật tốt</strong> và luôn <strong>ở gần bên anh</strong>. Anh yêu em! ❤️
      </p>
      <a class="back-btn" href="hop-qua.html">← Quay lại</a>
    </div>
  </div>

  <script>
    // ── p5.js Fireworks ──
    // Adapted from Daniel Shiffman's Coding Train
    let fireworks = [];
    let gravity;

    function setup() {
      const cnv = createCanvas(windowWidth, windowHeight);
      cnv.style('position', 'fixed');
      cnv.style('z-index', '0');
      colorMode(HSB);
      gravity = createVector(0, 0.18);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function draw() {
      colorMode(RGB);
      background(0, 0, 0, 20);  // trail effect

      // Spawn fireworks slightly more frequently for mobile visual richness
      if (random(1) < 0.055) {
        fireworks.push(new Firework());
      }

      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].show();
        if (fireworks[i].done()) fireworks.splice(i, 1);
      }
    }

    class Firework {
      constructor() {
        this.hu = random(360);
        this.firework = new Particle(random(width * 0.2, width * 0.8), height, this.hu, true);
        this.exploded = false;
        this.particles = [];
        this.particleCount = floor(random(80, 130));
      }
      done() { return this.exploded && this.particles.length === 0; }
      update() {
        if (!this.exploded) {
          this.firework.applyForce(gravity);
          this.firework.update();
          if (this.firework.vel.y >= 0) {
            this.exploded = true;
            this.explode();
          }
        }
        for (let i = this.particles.length - 1; i >= 0; i--) {
          this.particles[i].applyForce(gravity);
          this.particles[i].update();
          if (this.particles[i].done()) this.particles.splice(i, 1);
        }
      }
      explode() {
        for (let i = 0; i < this.particleCount; i++) {
          this.particles.push(new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false));
        }
      }
      show() {
        if (!this.exploded) this.firework.show();
        for (let p of this.particles) p.show();
      }
    }

    class Particle {
      constructor(x, y, hu, isFirework) {
        this.pos = createVector(x, y);
        this.isFirework = isFirework;
        this.lifespan = 255;
        this.hu = hu;
        this.acc = createVector(0, 0);
        if (isFirework) {
          this.vel = createVector(0, random(-13, -9));
        } else {
          this.vel = p5.Vector.random2D();
          this.vel.mult(random(2, 8));
        }
      }
      applyForce(f) { this.acc.add(f); }
      update() {
        if (!this.isFirework) {
          this.vel.mult(0.88);
          this.lifespan -= 5;
        }
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
      }
      done() { return this.lifespan < 0; }
      show() {
        colorMode(HSB);
        if (!this.isFirework) {
          strokeWeight(2.5);
          stroke(this.hu, 255, 255, this.lifespan);
        } else {
          strokeWeight(4);
          stroke(this.hu, 255, 255);
        }
        point(this.pos.x, this.pos.y);
      }
    }
  </script>
</body>

</html>
